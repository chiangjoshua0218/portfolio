<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>資產總覽</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Tab bar -->
  <div class="tab-bar" id="tab-bar">
    <!-- rendered by JS -->
  </div>

  <div class="container">
    <header>
      <div class="header-title">
        <h1>📊 資產總覽</h1>
        <div class="version-info">
          <span class="version-tag">v2.0.0</span>
          <span class="author-tag">by joshchiang0218</span>
        </div>
      </div>
      <div class="header-actions">
        <span id="last-updated" class="last-updated">尚未更新</span>
        <label class="btn btn-secondary" title="載入 portfolio.json">
          ↑ 匯入設定
          <input type="file" id="import-file" accept=".json" style="display:none" onchange="importConfig(event)" />
        </label>
        <button class="btn btn-secondary" onclick="exportConfig()">↓ 匯出設定</button>
        <button id="refresh-btn" class="btn btn-primary" onclick="refreshAllPrices()">
          <span class="btn-icon">↻</span> 更新股價
        </button>
      </div>
    </header>

    <!-- Overview panel -->
    <div id="panel-overview">
      <!-- Summary cards -->
      <div class="summary-cards overview-summary">
        <div class="card summary-card">
          <div class="card-label">總資產（所有人）</div>
          <div class="card-value" id="total-value">—</div>
          <div id="total-change" class="summary-change"></div>
        </div>
        <div class="card summary-card">
          <div class="card-label">台股</div>
          <div class="card-value" id="tw-value">—</div>
        </div>
        <div class="card summary-card">
          <div class="card-label">美股</div>
          <div class="card-value" id="us-value">—</div>
        </div>
        <div class="card summary-card">
          <div class="card-label">現金</div>
          <div class="card-value" id="cash-value">—</div>
        </div>
        <div class="card summary-card">
          <div class="card-label">債券</div>
          <div class="card-value" id="bond-value">—</div>
        </div>
        <div class="card summary-card">
          <div class="card-label">加密貨幣</div>
          <div class="card-value" id="crypto-value">—</div>
        </div>
      </div>

      <!-- Chart + historical side by side -->
      <div class="main-content">
        <div class="card chart-card">
          <h2>資產配置</h2>
          <div class="chart-wrapper">
            <canvas id="allocationChart"></canvas>
          </div>
          <div id="chart-legend" class="chart-legend"></div>
        </div>

        <div class="card">
          <div class="card-header">
            <h2>歷史資產紀錄</h2>
            <button class="btn-collapse" onclick="toggleCard('body-history')">−</button>
          </div>
          <div class="card-body" id="body-history">
            <div class="history-actions">
              <button class="btn btn-primary" onclick="saveCurrentAssets()">📌 記錄今日資產</button>
            </div>
            <div class="form-row" style="margin-top:12px">
              <div class="form-group">
                <label for="historical-date">日期</label>
                <input type="date" id="historical-date" />
              </div>
              <div class="form-group">
                <label for="historical-value">資產總值 (TWD)</label>
                <input type="number" id="historical-value" placeholder="1000000" min="0" step="any" />
              </div>
            </div>
            <button class="btn btn-secondary" onclick="addHistoricalRecord()">手動新增</button>
            <h3 style="margin-top:1.5rem">資產趨勢圖</h3>
            <div class="historical-chart-wrapper">
              <canvas id="historicalAssetChart"></canvas>
            </div>
            <h3 style="margin-top:1.5rem">紀錄明細</h3>
            <div id="historical-records-list" class="records-list">
              <p class="empty-state">尚無紀錄</p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Profile panels: rendered dynamically by JS -->
    <div id="profile-panels"></div>

    <!-- Settings -->
    <div class="card settings-card">
      <h2>匯率設定</h2>
      <div class="form-row">
        <div class="form-group">
          <label>USD/TWD 匯率</label>
          <input type="number" id="usd-rate" value="32" min="1" step="0.01" onchange="saveSettings()" />
        </div>
        <button class="btn btn-secondary" onclick="fetchExchangeRate()">自動取得匯率</button>
      </div>
    </div>
  </div>

  <!-- Edit Modal -->
  <div id="edit-modal" class="modal" style="display:none">
    <div class="modal-content">
      <h3>編輯持股</h3>
      <input type="hidden" id="edit-id" />
      <input type="hidden" id="edit-profile-id" />
      <div class="form-group">
        <label>類別（可手動調整配置歸類）</label>
        <select id="edit-category">
          <option value="tw_stock">台股</option>
          <option value="us_stock">美股</option>
          <option value="cash">現金</option>
          <option value="bond">債券</option>
          <option value="crypto">加密貨幣</option>
        </select>
      </div>
      <div class="form-group">
        <label>數量</label>
        <input type="number" id="edit-qty" min="0" step="any" />
      </div>
      <div class="form-group" id="edit-manual-price-group">
        <label>手動設定單價（留空則自動抓取）</label>
        <input type="number" id="edit-manual-price" min="0" step="any" placeholder="自動" />
      </div>
      <div class="form-group">
        <label>名稱</label>
        <input type="text" id="edit-name" />
      </div>
      <div class="modal-actions">
        <button class="btn btn-primary" onclick="saveEdit()">儲存</button>
        <button class="btn btn-secondary" onclick="closeModal()">取消</button>
      </div>
    </div>
  </div>

  <!-- Setup Modal -->
  <div id="setup-modal" class="modal" style="display:none">
    <div class="modal-content">
      <h3>歡迎使用資產總覽</h3>
      <p style="color:var(--text-muted);margin:0.5rem 0 1.5rem">請選擇設定檔位置，之後每次開啟都會自動讀取與儲存。</p>
      <div class="modal-actions">
        <button class="btn btn-primary" onclick="onCreateNewFile()">建立新設定檔</button>
        <button class="btn btn-secondary" onclick="onOpenExistingFile()">開啟現有設定檔</button>
      </div>
    </div>
  </div>

  <!-- Permission Banner -->
  <div id="permission-banner" style="display:none" class="permission-banner">
    <span>需要重新授權才能讀取設定檔</span>
    <button class="btn btn-primary" onclick="onRequestPermission()">授權讀取</button>
  </div>

  <script src="app.js?v=2.1.2"></script>
</body>
</html>

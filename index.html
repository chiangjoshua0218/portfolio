<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>資產總覽</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Tab bar -->
  <div class="tab-bar" id="tab-bar">
    <!-- rendered by JS -->
  </div>

  <div class="container">
    <header>
      <div class="header-title">
        <h1>📊 資產總覽</h1>
        <div class="version-info">
          <span class="version-tag">v3.1.1</span>
          <span class="author-tag">by joshchiang0218</span>
        </div>
      </div>
      <div class="header-actions">
        <span id="last-updated" class="last-updated">尚未更新</span>
        <span id="usd-rate-tag" class="rate-tag" onclick="fetchExchangeRate()" title="點擊重新抓取匯率">1 USD = -- TWD</span>
        <button class="btn btn-secondary" onclick="onImportConfig()">↑ 匯入設定</button>
        <input type="file" id="import-file" accept=".json" style="display:none" onchange="importConfig(event)" />
        <button class="btn btn-secondary" onclick="exportConfig()">↓ 匯出設定</button>
      </div>
    </header>

    <!-- Overview panel -->
    <div id="panel-overview">
      <!-- Summary cards -->
      <div class="summary-cards overview-summary">
        <div class="card summary-card">
          <div class="card-label">總資產（所有人）</div>
          <div class="card-value" id="total-value">—</div>
          <div id="total-change" class="summary-change"></div>
        </div>
        <div class="card summary-card">
          <div class="card-label">台股</div>
          <div class="card-value" id="tw-value">—</div>
          <div id="tw-change" class="summary-change"></div>
        </div>
        <div class="card summary-card">
          <div class="card-label">美股</div>
          <div class="card-value" id="us-value">—</div>
          <div id="us-change" class="summary-change"></div>
        </div>
        <div class="card summary-card">
          <div class="card-label">現金</div>
          <div class="card-value" id="cash-value">—</div>
        </div>
        <div class="card summary-card">
          <div class="card-label">債券</div>
          <div class="card-value" id="bond-value">—</div>
          <div id="bond-change" class="summary-change"></div>
        </div>
        <div class="card summary-card">
          <div class="card-label">加密貨幣</div>
          <div class="card-value" id="crypto-value">—</div>
          <div id="crypto-change" class="summary-change"></div>
        </div>
        <div class="card summary-card">
          <div class="card-label" style="color:#f87171">負債</div>
          <div class="card-value" id="debt-value" style="color:#f87171">—</div>
        </div>
      </div>

      <!-- Per-profile breakdown (collapsible) -->
      <details class="profile-breakdown-details">
        <summary>各人資產明細</summary>
        <div id="profile-breakdown-content" class="profile-breakdown-content"></div>
      </details>

      <!-- Chart + historical side by side -->
      <div class="main-content">
        <div class="card chart-card">
          <h2>資產配置</h2>
          <div class="chart-wrapper">
            <canvas id="allocationChart"></canvas>
          </div>
          <div id="chart-legend" class="chart-legend"></div>
        </div>

        <div class="card">
          <div class="card-header">
            <h2>歷史資產紀錄</h2>
            <button class="btn btn-primary" style="padding:0.25rem 0.75rem;font-size:0.8rem" onclick="openHistModal('overview')">＋ 新增紀錄</button>
            <button class="btn-collapse" onclick="toggleCard('body-history')">−</button>
          </div>
          <div class="card-body" id="body-history">
            <h3 style="margin-top:0">資產趨勢圖</h3>
            <div class="historical-chart-wrapper">
              <canvas id="historicalAssetChart"></canvas>
            </div>
            <details class="records-details" style="margin-top:1.5rem">
              <summary>紀錄明細</summary>
              <div id="historical-records-list" class="records-list"></div>
            </details>
          </div>
        </div>
      </div>
      <div class="storage-info">💾 載入中…</div>
    </div>

    <!-- Profile panels: rendered dynamically by JS -->
    <div id="profile-panels"></div>


  </div>

  <!-- History Modal -->
  <div id="hist-modal" class="modal" style="display:none">
    <div class="modal-content">
      <h3>新增資產紀錄</h3>
      <input type="hidden" id="hist-modal-pid" />
      <button class="btn btn-primary" style="width:100%;margin-bottom:1rem" onclick="histModalSaveToday()">📌 記錄今日資產</button>
      <div style="border-top:1px solid #2d3748;padding-top:1rem">
        <div class="form-group">
          <label>日期</label>
          <input type="date" id="hist-modal-date" />
        </div>
        <div class="form-group">
          <label>資產總值 (TWD)</label>
          <input type="number" id="hist-modal-value" placeholder="1000000" min="0" step="any" />
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="histModalAddManual()">手動新增</button>
        <button class="btn btn-secondary" onclick="closeHistModal()">取消</button>
      </div>
    </div>
  </div>

  <!-- Add Holding Modal -->
  <div id="add-holding-modal" class="modal" style="display:none">
    <div class="modal-content">
      <h3>新增資產</h3>
      <input type="hidden" id="add-modal-pid" />
      <form id="add-holding-form-add" onsubmit="addHolding(event, document.getElementById('add-modal-pid').value, 'add')">
        <div class="form-group">
          <label>類別</label>
          <select id="holding-category-add" onchange="onCategoryChange('add')">
            <option value="tw_stock">台股</option>
            <option value="us_stock">美股</option>
            <option value="cash">現金</option>
            <option value="bond">債券</option>
            <option value="crypto">加密貨幣</option>
            <option value="debt">負債</option>
          </select>
        </div>
        <div class="form-group" id="symbol-group-add">
          <label>代號 <span id="symbol-hint-add" class="hint">（如：2330、AAPL、BTC）</span></label>
          <input type="text" id="holding-symbol-add" placeholder="股票/幣種代號" />
        </div>
        <div class="form-group">
          <label>報價來源 <span class="hint">（通常不需更改）</span></label>
          <select id="holding-fetch-as-add">
            <option value="">自動（同類別）</option>
            <option value="tw_stock">台股</option>
            <option value="us_stock">美股</option>
            <option value="crypto">加密貨幣</option>
          </select>
        </div>
        <div class="form-group">
          <label id="qty-label-add">數量（股）</label>
          <input type="number" id="holding-qty-add" placeholder="0" min="0" step="any" required />
        </div>
        <div class="form-group" id="cost-price-group-add">
          <label>平均買入成本 <span class="hint">（選填，用於計算損益）</span></label>
          <input type="number" id="holding-cost-price-add" placeholder="每股均攤成本" min="0" step="any" />
        </div>
        <div class="form-group" id="manual-price-group-add" style="display:none">
          <label>單價（TWD）</label>
          <input type="number" id="holding-manual-price-add" placeholder="0" min="0" step="any" />
        </div>
        <div class="form-group">
          <label>名稱（選填）</label>
          <input type="text" id="holding-name-add" placeholder="自訂名稱" />
        </div>
        <div class="form-group" id="currency-group-add">
          <label>幣別</label>
          <select id="holding-currency-add">
            <option value="TWD">TWD 新台幣</option>
            <option value="USD">USD 美元</option>
          </select>
        </div>
        <div class="modal-actions">
          <button type="submit" class="btn btn-primary">新增</button>
          <button type="button" class="btn btn-secondary" onclick="closeAddModal()">取消</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Edit Modal -->
  <div id="edit-modal" class="modal" style="display:none">
    <div class="modal-content">
      <h3>編輯持股</h3>
      <input type="hidden" id="edit-id" />
      <input type="hidden" id="edit-profile-id" />
      <div class="form-group">
        <label>類別（配置歸類）</label>
        <select id="edit-category">
          <option value="tw_stock">台股</option>
          <option value="us_stock">美股</option>
          <option value="cash">現金</option>
          <option value="bond">債券</option>
          <option value="crypto">加密貨幣</option>
          <option value="debt">負債</option>
        </select>
      </div>
      <div class="form-group">
        <label>報價來源 <span class="hint">（通常不需更改）</span></label>
        <select id="edit-fetch-as">
          <option value="">自動（同類別）</option>
          <option value="tw_stock">台股</option>
          <option value="us_stock">美股</option>
          <option value="crypto">加密貨幣</option>
        </select>
      </div>
      <div class="form-group">
        <label>數量</label>
        <input type="number" id="edit-qty" min="0" step="any" />
      </div>
      <div class="form-group" id="edit-manual-price-group">
        <label>手動設定單價（留空則自動抓取）</label>
        <input type="number" id="edit-manual-price" min="0" step="any" placeholder="自動" />
      </div>
      <div class="form-group">
        <label>平均買入成本 <span class="hint">（選填，用於計算損益）</span></label>
        <input type="number" id="edit-cost-price" min="0" step="any" placeholder="每股均攤成本" />
      </div>
      <div class="form-group">
        <label>名稱</label>
        <input type="text" id="edit-name" />
      </div>
      <div class="modal-actions">
        <button class="btn btn-primary" onclick="saveEdit()">儲存</button>
        <button class="btn btn-secondary" onclick="closeModal()">取消</button>
      </div>
    </div>
  </div>

  <!-- Setup Modal -->
  <div id="setup-modal" class="modal" style="display:none">
    <div class="modal-content">
      <h3>歡迎使用資產總覽</h3>
      <p style="color:var(--text-muted);margin:0.5rem 0 1.5rem">請選擇設定檔位置，之後每次開啟都會自動讀取與儲存。</p>
      <div class="modal-actions">
        <button class="btn btn-primary" onclick="onCreateNewFile()">建立新設定檔</button>
        <button class="btn btn-secondary" onclick="onOpenExistingFile()">開啟現有設定檔</button>
      </div>
    </div>
  </div>

  <!-- Permission Banner -->
  <div id="permission-banner" style="display:none" class="permission-banner">
    <span>需要重新授權才能讀取設定檔</span>
    <button class="btn btn-primary" onclick="onRequestPermission()">授權讀取</button>
  </div>

  <script src="app.js?v=3.1.1"></script>
</body>
</html>
